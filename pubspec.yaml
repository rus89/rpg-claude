name: rpg_claude
description: "Registrovana Poljoprivredna Gazdinstva Srbije"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.1
  http: ^1.2.2
  csv: ^6.0.0
  fl_chart: ^0.70.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.20.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13
  riverpod_lint: ^2.6.1
  custom_lint: ^0.7.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#5C7A45"
    theme_color: "#5C7A45"
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/geojson/serbia_municipalities.geojson
